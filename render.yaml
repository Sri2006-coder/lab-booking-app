services:
  - type: web
    name: lab-booking-app
    env: python
    rootDir: website/backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -k gthread --threads 4 --timeout 60 -b 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
