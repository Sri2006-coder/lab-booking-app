<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" fill="none">
  <defs>
    <linearGradient id="slotifyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
  </defs>
  
  <!-- Icon Group -->
  <g transform="translate(10, 10)">
    <!-- Laptop Screen Outer -->
    <rect x="12" y="16" width="36" height="24" rx="3" stroke="url(#slotifyGrad)" stroke-width="3" stroke-linejoin="round" />
    <rect x="15.5" y="19.5" width="29" height="17" rx="1.5" fill="url(#slotifyGrad)" fill-opacity="0.1" />
    <!-- Laptop Base -->
    <path d="M 8 40 L 52 40 L 49 43.5 L 11 43.5 Z" fill="url(#slotifyGrad)" />
    <!-- Trackpad -->
    <rect x="26" y="40" width="8" height="2" rx="0.5" fill="#FFFFFF" opacity="0.8" />
    
    <!-- Pixels -->
    <rect x="47" y="13" width="3" height="3" rx="0.5" fill="#06B6D4" opacity="0.9" />
    <rect x="52" y="8" width="2" height="2" fill="#06B6D4" opacity="0.6" />
    <rect x="44" y="7" width="2" height="2" fill="#2563EB" opacity="0.8" />
    
    <rect x="10" y="12" width="3" height="3" rx="0.5" fill="#2563EB" opacity="0.9" />
    <rect x="5" y="7" width="2" height="2" fill="#2563EB" opacity="0.6" />
    <rect x="12" y="6" width="2" height="2" fill="#06B6D4" opacity="0.7" />
    
    <rect x="28" y="10" width="3" height="3" rx="0.5" fill="url(#slotifyGrad)" opacity="0.85" />
  </g>
  
  <!-- Typography -->
  <text x="80" y="38" font-family="'Poppins', 'Inter', sans-serif" font-size="26" font-weight="800" fill="#1E293B" letter-spacing="-0.5">Slotify</text>
  <text x="80" y="55" font-family="'Inter', sans-serif" font-size="9.5" font-weight="600" fill="#64748B" letter-spacing="0.2">Smart Lab Booking System</text>
</svg>