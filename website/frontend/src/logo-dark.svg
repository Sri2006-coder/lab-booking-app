<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" fill="none">
  <!-- Icon Group (White silhouette with blue gradient pixels) -->
  <g transform="translate(10, 10)">
    <!-- Laptop Screen Outer -->
    <rect x="12" y="16" width="36" height="24" rx="3" stroke="#FFFFFF" stroke-width="3" stroke-linejoin="round" />
    <rect x="15.5" y="19.5" width="29" height="17" rx="1.5" fill="#FFFFFF" fill-opacity="0.1" />
    <!-- Laptop Base -->
    <path d="M 8 40 L 52 40 L 49 43.5 L 11 43.5 Z" fill="#FFFFFF" />
    <!-- Trackpad -->
    <rect x="26" y="40" width="8" height="2" rx="0.5" fill="#2563EB" opacity="0.8" />
    
    <!-- Pixels -->
    <rect x="47" y="13" width="3" height="3" rx="0.5" fill="#00F0FF" opacity="0.95" />
    <rect x="52" y="8" width="2" height="2" fill="#00F0FF" opacity="0.8" />
    <rect x="44" y="7" width="2" height="2" fill="#FFFFFF" opacity="0.9" />
    
    <rect x="10" y="12" width="3" height="3" rx="0.5" fill="#FFFFFF" opacity="0.95" />
    <rect x="5" y="7" width="2" height="2" fill="#FFFFFF" opacity="0.8" />
    <rect x="12" y="6" width="2" height="2" fill="#00F0FF" opacity="0.9" />
    
    <rect x="28" y="10" width="3" height="3" rx="0.5" fill="#00F0FF" opacity="0.95" />
  </g>
  
  <!-- Typography -->
  <text x="80" y="38" font-family="'Poppins', 'Inter', sans-serif" font-size="26" font-weight="800" fill="#FFFFFF" letter-spacing="-0.5">Slotify</text>
  <text x="80" y="55" font-family="'Inter', sans-serif" font-size="9.5" font-weight="600" fill="#E2E8F0" letter-spacing="0.2">Smart Lab Booking System</text>
</svg>