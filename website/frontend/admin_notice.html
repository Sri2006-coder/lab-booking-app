<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Post Notice - Lab Booking</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .form-card {
            background: white; padding: 25px; border-radius: 16px; 
            max-width: 500px; margin: 40px auto;
            border-left: 5px solid #f59e0b;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        textarea {
            width: 100%; height: 100px; padding: 12px; border-radius: 10px;
            border: 1px solid #d1d5db; font-family: inherit; outline: none;
        }
    </style>
</head>
<body>
    <div class="header">🔔 Maintenance Notice</div>
    <div class="container">
        <div class="form-card">
            <h3 style="margin-top: 0;">Create Announcement</h3>
            <p style="font-size: 13px; color: #6b7280;">This will be displayed to all users for 1 hour.</p>
            <div id="status" class="msg" style="display: none;"></div>
            <div class="input-group">
                <textarea id="notice-msg" placeholder="Type your message here..."></textarea>
            </div>
            <button onclick="postNotice()" style="background: #f59e0b;">Broadcast Message</button>
            <button onclick="window.location.href='admin.html'" style="background: #9ca3af; margin-top: 10px;">Back</button>
        </div>
    </div>

    <script>
        async function postNotice() {
            const message = document.getElementById('notice-msg').value;
            const status = document.getElementById('status');
            if (!message) return alert('Enter a message');

            const res = await fetch('/api/notice', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            });
            const data = await res.json();
            if (data.success) {
                status.innerText = "✅ Broadcast sent successfully";
                status.style.display = 'block';
                status.style.background = '#fffbeb';
                status.style.color = '#92400e';
                status.style.borderLeftColor = '#f59e0b';
                document.getElementById('notice-msg').value = '';
            } else {
                status.innerText = "❌ Error: " + data.message;
                status.style.display = 'block';
            }
        }
    </script>
</body>
</html>
