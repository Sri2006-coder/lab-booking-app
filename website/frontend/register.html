<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Register - Slotify</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/style.css">
    <script>

        (function() {
            const originalFetch = window.fetch;
            const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? '' : 'https://lab-booking-app.onrender.com';
            
            window.fetch = function(input, init) {
                if (typeof input === 'string' && input.startsWith('/')) {
                    if (window.location.origin !== 'https://lab-booking-app.onrender.com') {
                        input = API_BASE + input;
                    }
                }
                init = init || {};
                init.credentials = 'include';
                return originalFetch(input, init);
            };
        })();
    </script>
</head>
<body class="bg-slate-50 h-screen flex flex-col justify-center items-center px-4 overflow-hidden relative">

    <!-- Decorative Blurs -->
    <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-blue-400/10 blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-indigo-400/10 blur-[100px] pointer-events-none"></div>

    <!-- Register Container Card -->
    <div class="w-full max-w-md bg-white/80 rounded-3xl shadow-2xl p-8 border border-slate-100 backdrop-blur-lg fade-in relative z-10">
        <div class="text-center mb-8">
            <!-- Full Slotify Logo -->
            <div class="flex justify-center mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" class="h-16 w-auto">
                    <defs>
                        <linearGradient id="slotifyGradReg" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#2563EB" />
                            <stop offset="100%" stop-color="#06B6D4" />
                        </linearGradient>
                    </defs>
                    <g transform="translate(10, 10)">
                        <rect x="12" y="16" width="36" height="24" rx="3" stroke="url(#slotifyGradReg)" stroke-width="3" stroke-linejoin="round" fill="none" />
                        <rect x="15.5" y="19.5" width="29" height="17" rx="1.5" fill="url(#slotifyGradReg)" fill-opacity="0.1" />
                        <path d="M 8 40 L 52 40 L 49 43.5 L 11 43.5 Z" fill="url(#slotifyGradReg)" />
                        <rect x="26" y="40" width="8" height="2" rx="0.5" fill="#FFFFFF" opacity="0.8" />
                        <rect x="47" y="13" width="3" height="3" rx="0.5" fill="#06B6D4" opacity="0.9" />
                        <rect x="52" y="8" width="2" height="2" fill="#06B6D4" opacity="0.6" />
                        <rect x="44" y="7" width="2" height="2" fill="#2563EB" opacity="0.8" />
                        <rect x="10" y="12" width="3" height="3" rx="0.5" fill="#2563EB" opacity="0.9" />
                        <rect x="5" y="7" width="2" height="2" fill="#2563EB" opacity="0.6" />
                        <rect x="12" y="6" width="2" height="2" fill="#06B6D4" opacity="0.7" />
                        <rect x="28" y="10" width="3" height="3" rx="0.5" fill="url(#slotifyGradReg)" opacity="0.85" />
                    </g>
                    <text x="80" y="38" font-family="'Poppins', 'Inter', sans-serif" font-size="26" font-weight="800" fill="#1E293B" letter-spacing="-0.5">Slotify</text>
                    <text x="80" y="55" font-family="'Inter', sans-serif" font-size="9.5" font-weight="600" fill="#64748B" letter-spacing="0.2">Smart Lab Booking System</text>
                </svg>
            </div>
            <h2 class="text-xl font-bold text-slate-900 tracking-tight">Create Faculty Account</h2>
            <p class="text-xs text-slate-500 mt-1">Book. Manage. Learn.</p>
        </div>
        
        <!-- Error Alerts -->
        <div id="error-msg" class="hidden mb-6 p-4 bg-red-50 border border-red-200 text-red-700 text-xs rounded-2xl text-center font-semibold slide-down flex items-center justify-center space-x-2">
            <!-- Keeps text injected dynamically -->
        </div>
        
        <form id="register-form" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Full Name</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-500 pointer-events-none">
                        <span class="material-symbols-rounded text-slate-400">person</span>
                    </span>
                    <input type="text" id="name" placeholder="Prof. Jane Doe" required class="w-full pl-11 pr-4 py-3.5 outline-none transition bg-slate-50/50 focus:bg-white text-sm text-slate-900 font-medium md3-input">
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Email Address</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-500 pointer-events-none">
                        <span class="material-symbols-rounded text-slate-400">mail</span>
                    </span>
                    <input type="email" id="email" placeholder="email@college.edu" required class="w-full pl-11 pr-4 py-3.5 outline-none transition bg-slate-50/50 focus:bg-white text-sm text-slate-900 font-medium md3-input">
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-500 pointer-events-none">
                        <span class="material-symbols-rounded text-slate-400">lock</span>
                    </span>
                    <input type="password" id="password" placeholder="••••••••" required class="w-full pl-11 pr-4 py-3.5 outline-none transition bg-slate-50/50 focus:bg-white text-sm text-slate-900 font-medium md3-input">
                </div>
            </div>
            
            <button type="submit" class="w-full btn-primary py-4 text-sm ripple">
                Register
            </button>
        </form>
        
        <div class="mt-8 text-center text-xs text-slate-600 font-semibold flex items-center justify-center space-x-3">
            <span>Already have an account?</span>
            <span class="w-1.5 h-1.5 rounded-full bg-slate-300"></span>
            <a href="index.html" class="text-brand-600 hover:text-brand-700 font-black transition underline decoration-2">Log In</a>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            // Faculty email domain validation
            if (!email.endsWith('@jayshriram.edu.in')) {
                // Try to use native React Native alert if available
                if (window.ReactNativeWebView) {
                    window.ReactNativeWebView.postMessage(JSON.stringify({
                        type: 'alert',
                        title: 'Access Denied',
                        message: 'Only official Jay Shriram faculty emails are allowed.'
                    }));
                } else {
                    alert("Access Denied: Only official Jay Shriram faculty emails are allowed.");
                }
                return;
            }

            try {
                const res = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await res.json();
                if (data.success) {
                    if (window.ReactNativeWebView) {
                        window.ReactNativeWebView.postMessage(JSON.stringify({
                            type: 'alert',
                            title: 'Success',
                            message: 'Registered successfully'
                        }));
                    } else {
                        alert("Registered successfully");
                    }
                    window.location.href = "index.html";
                } else {
                    errorMsg.innerText = "❌ " + data.message;
                    errorMsg.classList.remove('hidden');
                }
            } catch (err) {
                errorMsg.innerText = "❌ Server error";
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
