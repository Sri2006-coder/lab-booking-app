<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Timetable - Lab Booking</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 flex min-h-screen">
    <!-- Desktop Sidebar -->
    <aside class="hidden md:flex flex-col w-64 bg-white border-r border-gray-200 min-h-screen sticky top-0 z-30">
        <div class="px-6 py-5 border-b border-gray-200 bg-blue-600">
            <h1 class="font-bold text-2xl tracking-tight text-white">Lab Booking</h1>
            <div class="text-blue-200 text-xs mt-1 font-semibold uppercase tracking-wider">Faculty Panel</div>
        </div>
        <div class="p-4 flex-1 overflow-y-auto">
            <h2 class="text-xs uppercase text-gray-500 font-bold mb-2 tracking-wider mt-2">Navigation</h2>
            <a href="calendar_view.html" class="py-2.5 px-4 rounded-lg font-medium text-gray-700 hover:bg-gray-100 transition flex items-center"><span class="mr-3 text-lg">📅</span> Calendar View</a>
            <a href="mybookings.html" class="py-2.5 px-4 rounded-lg font-medium text-gray-700 hover:bg-gray-100 transition flex items-center"><span class="mr-3 text-lg">📋</span> My Bookings</a>
            
            <h2 class="text-xs uppercase text-gray-500 font-bold mb-2 tracking-wider mt-6">Lab Groups</h2>
            <div class="space-y-1">
                <div class="lab-filter active py-3 px-4 rounded-lg font-medium text-blue-700 bg-blue-50 hover:bg-blue-100 transition flex items-center cursor-pointer" data-group="lab567"><span class="mr-3 text-lg">💻</span> Lab 5, 6, 7</div>
                <div class="lab-filter py-3 px-4 rounded-lg font-medium text-gray-700 hover:bg-gray-100 transition flex items-center cursor-pointer" data-group="lab12"><span class="mr-3 text-lg">💻</span> Lab 1 & 2</div>
                <div class="lab-filter py-3 px-4 rounded-lg font-medium text-gray-700 hover:bg-gray-100 transition flex items-center cursor-pointer" data-group="halls"><span class="mr-3 text-lg">🏛️</span> Halls</div>
            </div>
        </div>
        <div class="p-4 border-t border-gray-200">
            <a href="#" onclick="logout()" class="py-2.5 px-4 rounded-lg font-bold text-red-600 hover:bg-red-50 flex items-center transition"><span class="mr-3 text-lg">🚪</span> Logout</a>
        </div>
    </aside>

    <!-- Main Content wrapper -->
    <div class="flex-1 flex flex-col min-w-0">
        <!-- Top Navbar (Mobile only) -->
        <nav class="md:hidden bg-blue-600 text-white sticky top-0 z-40 shadow-md">
            <div class="px-4 py-3 flex justify-between items-center">
                <h1 class="font-bold text-xl tracking-tight">Lab Booking</h1>
                <button onclick="document.getElementById('mobile-menu').classList.toggle('hidden')" class="p-2 focus:outline-none touch-manipulation">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                </button>
            </div>
            <!-- Mobile Menu -->
            <div id="mobile-menu" class="hidden bg-blue-700 px-4 py-2 shadow-inner transition-all duration-200">
                <a href="calendar_view.html" class="block py-3 text-blue-100 font-medium border-b border-blue-600">📅 Calendar View</a>
                <a href="mybookings.html" class="block py-3 text-blue-100 font-medium border-b border-blue-600">📋 My Bookings</a>
                
                <div class="py-3 border-b border-blue-600">
                    <div class="text-blue-300 text-xs uppercase font-bold mb-2 tracking-wider">Lab Groups</div>
                    <div class="lab-filter active block py-2 text-white font-medium cursor-pointer" data-group="lab567">💻 Lab 5, 6, 7</div>
                    <div class="lab-filter block py-2 text-blue-100 font-medium cursor-pointer" data-group="lab12">💻 Lab 1 & 2</div>
                    <div class="lab-filter block py-2 text-blue-100 font-medium cursor-pointer" data-group="halls">🏛️ Halls</div>
                </div>

                <a href="#" onclick="logout()" class="block py-3 text-red-200 font-medium">🚪 Logout</a>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="flex-1 px-4 md:px-6 lg:px-8 py-4 md:py-6 w-full max-w-7xl mx-auto">
        <!-- Notice Bar -->
        <div id="notice-bar" class="hidden mb-4 p-3 bg-yellow-50 border border-yellow-200 rounded-lg text-sm text-yellow-800 font-medium shadow-sm flex items-center">
            <span class="mr-2">🔔</span> <span id="notice-text-content"></span>
        </div>
        
        <!-- Date Header Card -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 mb-5 flex flex-col space-y-3">
            <h3 id="display-date" class="font-bold text-gray-800 text-lg">Loading...</h3>
            <div class="flex flex-col space-y-2">
                <div class="flex space-x-2">
                    <input type="date" id="date-picker" class="flex-1 bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 outline-none">
                    <button onclick="dateChanged()" class="bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg text-sm px-5 py-2.5 shadow-sm active:scale-95 transition">View</button>
                </div>
                <div id="admin-lab-ui" style="display: none;" class="flex space-x-2 w-full mt-2 border-t border-gray-100 pt-3">
                    <input type="text" id="new-lab-name" placeholder="E.g. Server Room" class="flex-1 bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 outline-none">
                    <button onclick="addLab()" class="bg-green-600 hover:bg-green-700 text-white font-medium rounded-lg text-sm px-5 py-2.5 shadow-sm active:scale-95 transition">Add Lab</button>
                </div>
            </div>
        </div>

        <!-- Timetable Grid -->
        <div id="timetable-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-5 pb-10"></div>
    </main>

    <!-- Booking Modal -->
    <div id="booking-modal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-gray-900 bg-opacity-50 transition-opacity">
        <div class="bg-white w-full sm:w-96 rounded-t-2xl sm:rounded-2xl shadow-xl p-6 transform transition-all duration-300 fade-in">
            <div class="w-12 h-1.5 bg-gray-300 rounded-full mx-auto mb-5 sm:hidden"></div>
            <h3 class="text-xl font-bold text-gray-900 mb-2">Confirm Booking</h3>
            <p id="modal-text" class="text-gray-600 mb-6 font-medium bg-gray-50 p-3 rounded-lg border border-gray-100"></p>
            <div class="flex flex-col space-y-3">
                <button onclick="confirmBooking()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 px-4 rounded-xl shadow-md active:scale-95 transition text-lg">Confirm</button>
                <button onclick="closeModal()" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3.5 px-4 rounded-xl active:scale-95 transition text-lg">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let currentUserId = null;
        let isAdmin = false;

        const urlParams = new URLSearchParams(window.location.search);
        let currentDate = urlParams.get('date') || new Date().toISOString().split('T')[0];
        let selectedSlot = null;

        document.getElementById('date-picker').value = currentDate;

        function toggleMenu() {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        }

        async function fetchNotice() {
            try {
                const res = await fetch('/api/notice');
                const data = await res.json();
                if (data) {
                    const bar = document.getElementById('notice-bar');
                    bar.innerHTML = `<span>🔔 ${data.message} (${data.minutes} mins remaining)</span>`;
                    bar.classList.remove('hidden');
                }
            } catch(e) {}
        }

        async function loadUser() {
            try {
                const res = await fetch("/current_user");
                const user = await res.json();
                currentUserId = user.id;
                isAdmin = (user.role === 'admin');
                
                if (isAdmin) {
                    const adminLabUI = document.getElementById('admin-lab-ui');
                    if (adminLabUI) adminLabUI.style.display = 'flex';
                }
            } catch(e) {
                console.error(e);
            }
        }

        let labs = [];
        let currentGroup = "lab567";

        function getFilteredLabs() {
            if (!Array.isArray(labs)) return [];
            if (currentGroup === "lab12") {
                return labs.filter(l => l.lab_name === "Lab 1" || l.lab_name === "Lab 2");
            }
            if (currentGroup === "lab567") {
                return labs.filter(l => ["Lab 5", "Lab 6", "Lab 7"].includes(l.lab_name));
            }
            if (currentGroup === "halls") {
                return labs.filter(l => l.lab_name && l.lab_name.includes("Hall"));
            }
            return labs;
        }

        async function loadLabs() {
            try {
                const res = await fetch("/labs", { cache: "no-store" });
                labs = await res.json();
                if (!Array.isArray(labs)) labs = [];
            } catch(e) {
                console.error(e);
                labs = [];
            }
        }

        async function addLab() {
            const name = document.getElementById('new-lab-name').value;
            if (!name) return alert('Enter lab name');
            const res = await fetch("/add_lab", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ name })
            });
            const data = await res.json();
            if (data.success) {
                document.getElementById('new-lab-name').value = '';
                await initializeDashboard();
            } else {
                alert(data.message || 'Error adding lab');
            }
        }

        async function deleteLab(id) {
            if (!confirm('Are you sure you want to delete this lab?')) return;
            const res = await fetch("/delete_lab", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ id })
            });
            const data = await res.json();
            if (data.success) {
                await initializeDashboard();
            } else {
                alert(data.message || 'Error deleting lab');
            }
        }

        function renderDashboard() {
            const container = document.getElementById('timetable-grid') || document.getElementById('timetable-container');
            if (!container) return;
            container.innerHTML = '';
            
            const periods = [1, 2, 3, 4, 5, 6, 7, 8];
            
            const dateObj = new Date(currentDate);
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const dayName = days[dateObj.getDay()];
            const shortDay = dayName ? dayName.substring(0, 3) : '';
            
            document.getElementById('display-date').innerText = `${dayName || 'Date'} (${currentDate})`;

            periods.forEach(period => {
                const box = document.createElement('div');
                box.className = 'bg-white rounded-2xl shadow-sm border border-gray-200 p-5 overflow-hidden';
                box.innerHTML = `<div class="font-bold text-gray-900 border-b border-gray-100 pb-3 mb-4 flex items-center justify-between">
                    <span>Period ${period}</span>
                    <span class="text-xs bg-gray-100 text-gray-500 px-2 py-1 rounded-md font-semibold">${shortDay}</span>
                </div>`;

                const labList = document.createElement('div');
                labList.className = 'space-y-4';

                const filtered = getFilteredLabs();
                if (Array.isArray(filtered)) {
                    filtered.forEach(labObj => {
                        const labName = labObj.lab_name;
                        const labId = labObj.id;
                        const labItem = document.createElement('div');
                        
                        const selectedDay = getSelectedDay(currentDate);
                        const block = isBlocked(labName, period, selectedDay);
                        const booking = getBooking(labName, period, currentDate);
                        let statusHtml = '';
                        
                        if (block) {
                            statusHtml = `<button class="w-full bg-red-50 text-red-700 font-bold py-3 px-4 rounded-xl border border-red-200 cursor-not-allowed shadow-sm blocked-btn" disabled>🔴 ${block.subject}</button>`;
                        } else if (booking) {
                            if (booking.faculty_id === currentUserId) {
                                statusHtml = `
                                    <div class="w-full bg-orange-50 border-orange-200 border py-3 px-4 rounded-xl flex flex-col items-center justify-center shadow-sm">
                                        <span class="text-orange-700 font-semibold text-center mb-1">Booked</span>
                                        <button type="button" onclick="cancelBooking('${labName}', ${period})" class="cancel-booking-btn mt-2 bg-red-100 hover:bg-red-200 active:bg-red-300 text-red-700 font-bold py-2.5 px-4 rounded-lg w-full max-w-[200px] shadow-sm transition touch-manipulation border border-red-200">Cancel Booking</button>
                                    </div>
                                `;
                            } else {
                                statusHtml = `
                                    <div class="w-full bg-orange-50 border-orange-200 border py-3 px-4 rounded-xl flex flex-col items-center justify-center shadow-sm">
                                        <span class="text-orange-700 font-semibold text-center mb-1">Booked by ${booking.faculty_name}</span>
                                    </div>
                                `;
                            }
                        } else {
                            statusHtml = `<button class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold py-3 px-4 rounded-xl shadow-sm transition active:scale-[0.98] book-btn" onclick="bookLab('${labName}', ${period})">🔵 Book Now</button>`;
                        }

                        const delBtn = isAdmin ? `<button onclick="deleteLab(${labId})" class="text-red-500 hover:text-red-700 transition" title="Delete Lab">🗑️</button>` : '';

                        labItem.innerHTML = `
                            <div class="mb-2 pl-1 font-semibold text-gray-800 flex items-center justify-between">
                                <span><span class="mr-2 text-lg">📍</span> ${labName}</span>
                                ${delBtn}
                            </div>
                            ${statusHtml}
                        `;
                        labList.appendChild(labItem);
                    });
                }
                box.appendChild(labList);
                container.appendChild(box);
            });
        }

        async function initializeDashboard() {
            await loadLabs();
            await loadTimetable();
            await loadBookings();
            renderDashboard();
        }

        async function dateChanged() {
            currentDate = document.getElementById('date-picker').value;
            await initializeDashboard();
        }

        let timetable = [];

        async function loadTimetable() {
            try {
                const res = await fetch(`/api/timetable?date=${currentDate}`, { credentials: "include", cache: "no-store" });
                const data = await res.json();
                timetable = data.fixed || [];
            } catch (error) {
                console.error("Error fetching timetable:", error);
                timetable = [];
            }
        }
        
        function getSelectedDay(dateStr) {
            return new Date(dateStr).toLocaleDateString("en-US", { weekday: "long" });
        }

        function isBlocked(lab, period, day) {
            return timetable.find(t =>
                t.day === day &&
                t.period == period &&
                t.lab === lab
            );
        }

        let bookings = [];
        
        async function loadBookings() {
            try {
                const res = await fetch("/bookings", { cache: "no-store" });
                bookings = await res.json();
                if (!Array.isArray(bookings)) bookings = [];
            } catch (error) {
                console.error("Error fetching bookings:", error);
                bookings = [];
            }
        }

        function getBooking(lab, period, date) {
            return bookings.find(b =>
                b.lab === lab &&
                b.period === period &&
                b.date === date
            );
        }

        async function bookLab(lab, period) {
            const date = currentDate;

            const res = await fetch("/book", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ lab, period, date })
            });

            await loadBookings();
            renderDashboard();
        }

        async function cancelBooking(lab, period) {
            if (!confirm('Cancel this booking?')) return;
            const date = currentDate;

            await fetch("/cancel", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ lab, period, date })
            });

            await loadBookings();
            renderDashboard();
        }

        async function logout() {
            await fetch('/api/logout');
            window.location.href = 'index.html';
        }

        document.querySelectorAll(".lab-filter").forEach(item => {
            item.addEventListener("click", function () {
                document.querySelectorAll(".lab-filter").forEach(el => {
                    el.classList.remove("active");
                    if (el.classList.contains("bg-blue-50")) {
                        el.classList.remove("bg-blue-50", "text-blue-700");
                        el.classList.add("text-gray-700");
                    }
                    if (el.classList.contains("text-white") && el.closest('#mobile-menu')) {
                        el.classList.remove("text-white");
                        el.classList.add("text-blue-100");
                    }
                });

                this.classList.add("active");
                if (this.closest('#mobile-menu')) {
                    this.classList.remove("text-blue-100");
                    this.classList.add("text-white");
                } else {
                    this.classList.remove("text-gray-700");
                    this.classList.add("bg-blue-50", "text-blue-700");
                }

                currentGroup = this.dataset.group;
                renderDashboard();
                
                document.querySelectorAll(`.lab-filter[data-group="${currentGroup}"]`).forEach(el => {
                    if (el !== this) {
                        el.classList.add("active");
                        if (el.closest('#mobile-menu')) {
                            el.classList.remove("text-blue-100");
                            el.classList.add("text-white");
                        } else {
                            el.classList.remove("text-gray-700");
                            el.classList.add("bg-blue-50", "text-blue-700");
                        }
                    }
                });
            });
        });

        window.onload = async function() {
            await loadUser();
            fetchNotice();
            await initializeDashboard();

            setInterval(initializeDashboard, 5000);
        };
    </script>
    </div> <!-- End Main Content Wrapper -->
