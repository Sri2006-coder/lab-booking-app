<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Timetable - Lab Booking</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 flex min-h-screen">
    <!-- Desktop Sidebar -->
    <aside class="hidden md:flex flex-col w-64 bg-white border-r border-gray-200 min-h-screen sticky top-0 z-30">
        <div class="px-6 py-5 border-b border-gray-200 bg-blue-600">
            <h1 class="font-bold text-2xl tracking-tight text-white">Lab Booking</h1>
            <div class="text-blue-200 text-xs mt-1 font-semibold uppercase tracking-wider">Faculty Panel</div>
        </div>
        <div class="flex flex-col p-4 space-y-2 flex-grow overflow-y-auto">
            <h2 class="text-xs uppercase text-gray-500 font-bold mb-2 tracking-wider mt-2">Lab Selection</h2>
            <a href="#" onclick="loadTimetable('1,2')" id="desktop-btn-1-2" class="py-2.5 px-4 rounded-lg font-medium text-gray-700 hover:bg-gray-100 transition">Lab 1 & 2</a>
            <a href="#" onclick="loadTimetable('5,6,7')" id="desktop-btn-5-6-7" class="py-2.5 px-4 rounded-lg font-medium text-gray-700 hover:bg-gray-100 transition">Lab 5, 6, 7</a>
            <a href="#" onclick="loadTimetable('3,4')" id="desktop-btn-3-4" class="py-2.5 px-4 rounded-lg font-medium text-gray-700 hover:bg-gray-100 transition">Halls</a>
            
            <div class="my-4 border-t border-gray-100"></div>
            
            <h2 class="text-xs uppercase text-gray-500 font-bold mb-2 tracking-wider">Navigation</h2>
            <a href="calendar_view.html" class="py-2.5 px-4 rounded-lg font-medium text-gray-700 hover:bg-gray-100 transition flex items-center"><span class="mr-3 text-lg">📅</span> Calendar View</a>
            <a href="mybookings.html" class="py-2.5 px-4 rounded-lg font-medium text-gray-700 hover:bg-gray-100 transition flex items-center"><span class="mr-3 text-lg">📋</span> My Bookings</a>
        </div>
        <div class="p-4 border-t border-gray-200">
            <a href="#" onclick="logout()" class="py-2.5 px-4 rounded-lg font-bold text-red-600 hover:bg-red-50 flex items-center transition"><span class="mr-3 text-lg">🚪</span> Logout</a>
        </div>
    </aside>

    <!-- Main Content wrapper -->
    <div class="flex-1 flex flex-col min-w-0">
        <!-- Top Navbar (Mobile only) -->
        <nav class="md:hidden bg-blue-600 text-white sticky top-0 z-40 shadow-md">
            <div class="px-4 py-3 flex justify-between items-center">
                <h1 class="font-bold text-xl tracking-tight">Lab Booking</h1>
                <button onclick="document.getElementById('mobile-menu').classList.toggle('hidden')" class="p-2 focus:outline-none touch-manipulation">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                </button>
            </div>
            <!-- Mobile Menu -->
            <div id="mobile-menu" class="hidden bg-blue-700 px-4 py-2 shadow-inner transition-all duration-200">
                <a href="#" onclick="loadTimetable('1,2'); toggleMenu()" id="btn-1-2" class="block py-3 text-blue-100 font-medium border-b border-blue-600">Lab 1 & 2</a>
                <a href="#" onclick="loadTimetable('5,6,7'); toggleMenu()" id="btn-5-6-7" class="block py-3 text-blue-100 font-medium border-b border-blue-600">Lab 5, 6, 7</a>
                <a href="#" onclick="loadTimetable('3,4'); toggleMenu()" id="btn-3-4" class="block py-3 text-blue-100 font-medium border-b border-blue-600">Halls</a>
                <a href="calendar_view.html" class="block py-3 text-blue-100 font-medium border-b border-blue-600">📅 Calendar View</a>
                <a href="mybookings.html" class="block py-3 text-blue-100 font-medium border-b border-blue-600">📋 My Bookings</a>
                <a href="#" onclick="logout()" class="block py-3 text-red-200 font-medium">🚪 Logout</a>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="flex-1 px-4 md:px-6 lg:px-8 py-4 md:py-6 w-full max-w-7xl mx-auto">
        <!-- Notice Bar -->
        <div id="notice-bar" class="hidden mb-4 p-3 bg-yellow-50 border border-yellow-200 rounded-lg text-sm text-yellow-800 font-medium shadow-sm flex items-center">
            <span class="mr-2">🔔</span> <span id="notice-text-content"></span>
        </div>
        
        <!-- Date Header Card -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 mb-5 flex flex-col space-y-3">
            <h3 id="display-date" class="font-bold text-gray-800 text-lg">Loading...</h3>
            <div class="flex space-x-2">
                <input type="date" id="date-picker" class="flex-1 bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 outline-none">
                <button onclick="dateChanged()" class="bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg text-sm px-5 py-2.5 shadow-sm active:scale-95 transition">View</button>
            </div>
        </div>

        <!-- Timetable Grid -->
        <div id="timetable-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-5 pb-10"></div>
    </main>

    <!-- Booking Modal -->
    <div id="booking-modal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-gray-900 bg-opacity-50 transition-opacity">
        <div class="bg-white w-full sm:w-96 rounded-t-2xl sm:rounded-2xl shadow-xl p-6 transform transition-all duration-300 fade-in">
            <div class="w-12 h-1.5 bg-gray-300 rounded-full mx-auto mb-5 sm:hidden"></div>
            <h3 class="text-xl font-bold text-gray-900 mb-2">Confirm Booking</h3>
            <p id="modal-text" class="text-gray-600 mb-6 font-medium bg-gray-50 p-3 rounded-lg border border-gray-100"></p>
            <div class="flex flex-col space-y-3">
                <button onclick="confirmBooking()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 px-4 rounded-xl shadow-md active:scale-95 transition text-lg">Confirm</button>
                <button onclick="closeModal()" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3.5 px-4 rounded-xl active:scale-95 transition text-lg">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let currentLabs = '1,2';
        const urlParams = new URLSearchParams(window.location.search);
        let currentDate = urlParams.get('date') || new Date().toISOString().split('T')[0];
        let selectedSlot = null;

        document.getElementById('date-picker').value = currentDate;

        function toggleMenu() {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        }

        async function fetchNotice() {
            try {
                const res = await fetch('/api/notice');
                const data = await res.json();
                if (data) {
                    const bar = document.getElementById('notice-bar');
                    // We need to set innerHTML to notice-bar to match old logic but style it
                    bar.innerHTML = `<span>🔔 ${data.message} (${data.minutes} mins remaining)</span>`;
                    bar.classList.remove('hidden');
                }
            } catch(e) {}
        }

        async function loadTimetable(labs = currentLabs, date = currentDate) {
            currentLabs = labs;
            currentDate = date;
            
            ['1,2', '5,6,7', '3,4'].forEach(l => {
                const btnIdSuffix = l.replace(/,/g, '-');
                const btn = document.getElementById('btn-' + btnIdSuffix);
                const desktopBtn = document.getElementById('desktop-btn-' + btnIdSuffix);
                
                if(btn) {
                    if (l === labs) {
                        btn.classList.add('text-white', 'bg-blue-800');
                        btn.classList.remove('text-blue-100');
                    } else {
                        btn.classList.remove('text-white', 'bg-blue-800');
                        btn.classList.add('text-blue-100');
                    }
                }
                
                if(desktopBtn) {
                    if (l === labs) {
                        desktopBtn.classList.add('bg-blue-50', 'text-blue-700', 'font-bold');
                        desktopBtn.classList.remove('hover:bg-gray-100', 'text-gray-700');
                    } else {
                        desktopBtn.classList.remove('bg-blue-50', 'text-blue-700', 'font-bold');
                        desktopBtn.classList.add('hover:bg-gray-100', 'text-gray-700');
                    }
                }
            });

            const res = await fetch(`/api/timetable?labs=${labs}&date=${date}`);
            if (res.status === 401) window.location.href = 'index.html';
            const data = await res.json();

            document.getElementById('display-date').innerText = `${data.day} (${data.date})`;
            
            const grid = document.getElementById('timetable-grid');
            grid.innerHTML = '';
            
            console.log("Fixed Schedule Data:", data.fixed);

            for (let period = 1; period <= 8; period++) {
                const box = document.createElement('div');
                box.className = 'bg-white rounded-2xl shadow-sm border border-gray-200 p-5 overflow-hidden';
                box.innerHTML = `<div class="font-bold text-gray-900 border-b border-gray-100 pb-3 mb-4 flex items-center justify-between">
                    <span>Period ${period}</span>
                    <span class="text-xs bg-gray-100 text-gray-500 px-2 py-1 rounded-md font-semibold">${data.day.substring(0,3)}</span>
                </div>`;

                const labList = document.createElement('div');
                labList.className = 'space-y-4';

                (data.labs || []).forEach(labInfo => {
                    const labItem = document.createElement('div');
                    
                    const isFixed = data.fixed.find(f => 
                        f.day.toLowerCase() === data.day.toLowerCase() && 
                        f.period === period && 
                        f.lab.toLowerCase() === labInfo.lab_name.toLowerCase()
                    );
                    
                    const isBooked = data.bookings.find(b =>
                        b.period === period &&
                        b.lab_id === labInfo.id
                    );
                    
                    let statusHtml = '';
                    if (isFixed) {
                        statusHtml = `<button class="w-full bg-red-50 text-red-700 font-bold py-3 px-4 rounded-xl border border-red-200 cursor-not-allowed shadow-sm">🔴 ${isFixed.subject}</button>`;
                    } else if (isBooked) {
                        statusHtml = `
                            <div class="w-full ${isBooked.own ? 'bg-orange-50 border-orange-200' : 'bg-gray-50 border-gray-200'} border py-3 px-4 rounded-xl flex flex-col items-center justify-center shadow-sm">
                                <span class="${isBooked.own ? 'text-orange-700' : 'text-gray-600'} font-semibold text-center mb-1">Booked by ${isBooked.faculty_name}</span>
                                ${isBooked.own ? `<button type="button" onclick="cancelBooking(${isBooked.id})" class="cancel-booking-btn mt-2 bg-red-100 hover:bg-red-200 active:bg-red-300 text-red-700 font-bold py-2.5 px-4 rounded-lg w-full max-w-[200px] shadow-sm transition touch-manipulation border border-red-200">Cancel Booking</button>` : ''}
                            </div>`;
                    } else {
                        statusHtml = `<button class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold py-3 px-4 rounded-xl shadow-sm transition active:scale-[0.98]" onclick="openBookingModal(${labInfo.id}, '${labInfo.lab_name}', ${period}, '${data.day}', '${data.date}')">🔵 Book Now</button>`;
                    }

                    labItem.innerHTML = `
                        <div class="mb-2 pl-1 font-semibold text-gray-800 flex items-center">
                            <span class="mr-2 text-lg">📍</span> ${labInfo.lab_name}
                        </div>
                        ${statusHtml}
                    `;
                    labList.appendChild(labItem);
                });
                box.appendChild(labList);
                grid.appendChild(box);
            }
        }

        function dateChanged() {
            currentDate = document.getElementById('date-picker').value;
            loadTimetable();
        }

        function openBookingModal(labId, labName, period, day, date) {
            selectedSlot = { labId, period, day, date };
            document.getElementById('modal-text').innerHTML = `📍 <b>${labName}</b><br>⏰ Period ${period}`;
            const modal = document.getElementById('booking-modal');
            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('booking-modal').classList.add('hidden');
        }

        async function confirmBooking() {
            const res = await fetch('/api/book', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    lab: selectedSlot.labId,
                    period: selectedSlot.period,
                    day: selectedSlot.day,
                    date: selectedSlot.date
                })
            });
            const data = await res.json();
            if (data.success) {
                closeModal();
                loadTimetable();
            } else if (data.message === 'limit') {
                alert('❌ Max bookings reached for today');
                closeModal();
            } else {
                alert('Error booking slot');
            }
        }

        async function cancelBooking(id) {
            if (!confirm('Cancel this booking?')) return;
            const res = await fetch(`/api/cancel_booking/${id}`, { method: 'DELETE' });
            if (res.ok) loadTimetable();
        }

        async function logout() {
            await fetch('/api/logout');
            window.location.href = 'index.html';
        }

        fetchNotice();
        loadTimetable();
    </script>
    </div> <!-- End Main Content Wrapper -->
</body>
</html>
