<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | Lab Booking</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ffffff">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=20">
</head>
<body>
    <div class="header">
        <div style="display: flex; align-items: center; gap: 10px;">
            <div style="width: 24px; height: 24px; background: var(--primary); border-radius: 4px; display: flex; justify-content: center; align-items: center;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="#ffffff"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 14l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
            </div>
            <span>Lab Booking</span>
        </div>
        <div style="font-size: 13px; font-weight: 500; color: var(--text-muted);">Faculty Portal</div>
    </div>

    <!-- Mobile Top Tabs for Category Selection -->
    <div class="mobile-tabs" id="mobile-tabs">
        <a href="#" onclick="loadTimetable('1,2')" class="active" id="mbtn-1-2">Lab 1 & 2</a>
        <a href="#" onclick="loadTimetable('5,6,7')" id="mbtn-5-6-7">Lab 5, 6, 7</a>
        <a href="#" onclick="loadTimetable('3,4')" id="mbtn-3-4">Halls</a>
    </div>

    <div class="main-layout">
        <!-- Desktop Sidebar -->
        <div class="sidebar">
            <h2>Categories</h2>
            <a href="#" onclick="loadTimetable('1,2')" class="active" id="btn-1-2">Lab 1 & 2</a>
            <a href="#" onclick="loadTimetable('5,6,7')" id="btn-5-6-7">Lab 5, 6, 7</a>
            <a href="#" onclick="loadTimetable('3,4')" id="btn-3-4">Halls</a>
            <hr style="border: 0; border-top: 1px solid var(--border); margin: 16px 0;">
            <h2>Quick Links</h2>
            <a href="mybookings.html">My Bookings</a>
            <a href="calendar_view.html">Calendar</a>
            <div style="flex:1;"></div>
            <a href="#" onclick="logout()" style="color: var(--danger); margin-top: auto;">Sign out</a>
        </div>

        <div class="main-content">
            <div id="notice-bar" class="notice-banner" style="display: none;"></div>
            
            <div class="section-header">
                <div>
                    <h1 class="section-title" id="display-date">Select Date</h1>
                    <div style="font-size: 13px; color: var(--text-muted); margin-top: 2px;">View schedule and book available slots base on limits.</div>
                </div>
                <div class="date-selector-wrapper">
                    <input type="date" id="date-picker">
                    <button class="btn-secondary" onclick="dateChanged()">View</button>
                </div>
            </div>

            <div id="timetable-grid" class="period-grid"></div>
        </div>
    </div>

    <!-- Booking Modal -->
    <div id="booking-modal" class="modal-overlay">
        <div class="modal-panel">
            <div class="modal-header">Confirm Booking</div>
            <div class="modal-body" id="modal-text"></div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal()">Cancel</button>
                <button onclick="confirmBooking()">Confirm Slot</button>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation for Mobile -->
    <div class="bottom-nav">
        <a href="dashboard.html" class="active">
            <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
            <span>Home</span>
        </a>
        <a href="mybookings.html">
            <svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg>
            <span>Bookings</span>
        </a>
        <a href="calendar_view.html">
            <svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20a2 2 0 0 0 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"/></svg>
            <span>Calendar</span>
        </a>
        <a href="#" onclick="logout()">
            <svg viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
            <span>Logout</span>
        </a>
    </div>

    <script>
        let currentLabs = '1,2';
        const urlParams = new URLSearchParams(window.location.search);
        let currentDate = urlParams.get('date') || new Date().toISOString().split('T')[0];
        let selectedSlot = null;

        document.getElementById('date-picker').value = currentDate;

        async function fetchNotice() {
            const res = await fetch('/api/notice');
            const data = await res.json();
            if (data) {
                const bar = document.getElementById('notice-bar');
                bar.innerHTML = `<div><strong>Notice:</strong> ${data.message}</div> <div>Ends in ${data.minutes}m</div>`;
                bar.style.display = 'flex';
            }
        }

        async function loadTimetable(labs = currentLabs, date = currentDate) {
            currentLabs = labs;
            currentDate = date;
            
            // Update UI Desktop Sidebar
            ['1,2', '5,6,7', '3,4'].forEach(l => {
                const id = 'btn-' + l.replace(/,/g, '-');
                if(document.getElementById(id)) document.getElementById(id).className = (l === labs ? 'active' : '');
            });

            // Update UI Mobile Tabs
            ['1,2', '5,6,7', '3,4'].forEach(l => {
                const id = 'mbtn-' + l.replace(/,/g, '-');
                if(document.getElementById(id)) document.getElementById(id).className = (l === labs ? 'active' : '');
            });

            const res = await fetch(`/api/timetable?labs=${labs}&date=${date}`);
            if (res.status === 401) window.location.href = 'index.html';
            const data = await res.json();

            document.getElementById('display-date').innerText = `${data.day}, ${data.date}`;
            
            const grid = document.getElementById('timetable-grid');
            grid.innerHTML = '';

            data.timetable.forEach(period => {
                const box = document.createElement('div');
                box.className = 'period-box';
                box.innerHTML = `<div class="period-header"><span>Period ${period.period}</span></div>`;

                const body = document.createElement('div');
                body.className = 'period-body';

                period.labs.forEach(lab => {
                    const labItem = document.createElement('div');
                    labItem.className = 'lab-item';
                    
                    let statusHtml = '';
                    if (lab.status.type === 'fixed') {
                        statusHtml = `<div class="badge badge-fixed">${lab.status.subject}</div>`;
                    } else if (lab.status.type === 'booked') {
                        statusHtml = `
                            <div class="lab-status-wrap">
                                <div class="badge badge-booked">Booked by ${lab.status.name}</div>
                                ${lab.status.own ? `<span class="btn-cancel-link" onclick="cancelBooking(${lab.status.id})">Cancel</span>` : ''}
                            </div>`;
                    } else {
                        statusHtml = `<button class="btn-sm" onclick="openBookingModal(${lab.lab_id}, '${lab.lab_name}', ${period.period}, '${data.day}', '${data.date}')">Book Slot</button>`;
                    }

                    labItem.innerHTML = `
                        <div class="lab-name">
                            ${lab.lab_name}
                        </div>
                        ${statusHtml}
                    `;
                    body.appendChild(labItem);
                });
                box.appendChild(body);
                grid.appendChild(box);
            });
        }

        function dateChanged() {
            currentDate = document.getElementById('date-picker').value;
            loadTimetable();
        }

        function openBookingModal(labId, labName, period, day, date) {
            selectedSlot = { labId, period, day, date };
            document.getElementById('modal-text').innerHTML = `
                <table style="width:100%; border-collapse:collapse;">
                    <tr><td style="padding:4px 0; color:var(--text-muted);">Lab</td><td style="text-align:right; font-weight:600; color:var(--text-main);">${labName}</td></tr>
                    <tr><td style="padding:4px 0; color:var(--text-muted);">Date</td><td style="text-align:right; font-weight:600; color:var(--text-main);">${date} (${day})</td></tr>
                    <tr><td style="padding:4px 0; color:var(--text-muted);">Period</td><td style="text-align:right; font-weight:600; color:var(--text-main);">Period ${period}</td></tr>
                </table>
            `;
            document.getElementById('booking-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('booking-modal').style.display = 'none';
        }

        async function confirmBooking() {
            const res = await fetch('/api/book', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    lab: selectedSlot.labId,
                    period: selectedSlot.period,
                    day: selectedSlot.day,
                    date: selectedSlot.date
                })
            });
            const data = await res.json();
            if (data.success) {
                closeModal();
                loadTimetable();
            } else if (data.message === 'limit') {
                alert('Booking limit reached for the week.');
            } else {
                alert('Error booking slot: ' + data.message);
            }
        }

        async function cancelBooking(id) {
            if (!confirm('Cancel this booking?')) return;
            const res = await fetch(`/api/cancel_booking/${id}`, { method: 'DELETE' });
            if (res.ok) loadTimetable();
        }

        async function logout() {
            await fetch('/api/logout');
            window.location.href = 'index.html';
        }

        fetchNotice();
        loadTimetable();
        
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("/sw.js").catch(err => console.log(err));
        }
    </script>
</body>
</html>
