<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Lab Booking</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4F46E5">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=11">
</head>
<body>
    <div class="header">
        <div>LabApp Pro</div>
        <!-- Notice badge could go here -->
    </div>

    <!-- Mobile Top Tabs for Category Selection -->
    <div class="mobile-tabs" id="mobile-tabs">
        <a href="#" onclick="loadTimetable('1,2')" class="active" id="mbtn-1-2">Lab 1 & 2</a>
        <a href="#" onclick="loadTimetable('5,6,7')" id="mbtn-5-6-7">Lab 5, 6, 7</a>
        <a href="#" onclick="loadTimetable('3,4')" id="mbtn-3-4">Halls</a>
    </div>

    <div class="main-layout">
        <!-- Desktop Sidebar -->
        <div class="sidebar">
            <h2 style="margin-bottom: 25px;">Categories</h2>
            <a href="#" onclick="loadTimetable('1,2')" class="active" id="btn-1-2">💻 Lab 1 & 2</a>
            <a href="#" onclick="loadTimetable('5,6,7')" id="btn-5-6-7">🖥 Lab 5, 6, 7</a>
            <a href="#" onclick="loadTimetable('3,4')" id="btn-3-4">🏛 Halls</a>
            <hr style="border: 0; border-top: 1px solid #e5e7eb; margin: 20px 0;">
            <a href="mybookings.html">📋 My Bookings</a>
            <a href="calendar_view.html">📆 Calendar</a>
            <a href="#" onclick="logout()" style="color: var(--danger);">🚪 Logout</a>
        </div>

        <div class="main-content">
            <div id="notice-bar" class="notice" style="display: none;"></div>
            
            <div class="date-selector">
                <h3 id="display-date">Select Date</h3>
                <div style="display: flex; gap: 8px; align-items: center;">
                    <input type="date" id="date-picker">
                    <button onclick="dateChanged()">View</button>
                </div>
            </div>

            <div id="timetable-grid" class="period-grid"></div>
        </div>
    </div>

    <!-- Booking Modal -->
    <div id="booking-modal" class="modal">
        <div class="modal-content">
            <h3>Confirm Booking</h3>
            <p id="modal-text"></p>
            <button onclick="confirmBooking()">Confirm</button>
            <button onclick="closeModal()" class="btn-secondary">Cancel</button>
        </div>
    </div>

    <!-- Bottom Navigation for Mobile -->
    <div class="bottom-nav">
        <a href="dashboard.html" class="active">
            <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
            <span>Home</span>
        </a>
        <a href="mybookings.html">
            <svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg>
            <span>Bookings</span>
        </a>
        <a href="calendar_view.html">
            <svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20a2 2 0 0 0 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"/></svg>
            <span>Calendar</span>
        </a>
        <a href="#" onclick="logout()">
            <svg viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
            <span>Logout</span>
        </a>
    </div>

    <script>
        let currentLabs = '1,2';
        const urlParams = new URLSearchParams(window.location.search);
        let currentDate = urlParams.get('date') || new Date().toISOString().split('T')[0];
        let selectedSlot = null;

        document.getElementById('date-picker').value = currentDate;

        async function fetchNotice() {
            const res = await fetch('/api/notice');
            const data = await res.json();
            if (data) {
                const bar = document.getElementById('notice-bar');
                bar.innerHTML = `<div>🔔</div><div>${data.message}<div style="font-size:11px; opacity:0.8; margin-top:2px;">Ends in ${data.minutes} mins</div></div>`;
                bar.style.display = 'flex';
            }
        }

        async function loadTimetable(labs = currentLabs, date = currentDate) {
            currentLabs = labs;
            currentDate = date;
            
            // Update UI Desktop Sidebar
            ['1,2', '5,6,7', '3,4'].forEach(l => {
                const id = 'btn-' + l.replace(/,/g, '-');
                if(document.getElementById(id)) document.getElementById(id).className = (l === labs ? 'active' : '');
            });

            // Update UI Mobile Tabs
            ['1,2', '5,6,7', '3,4'].forEach(l => {
                const id = 'mbtn-' + l.replace(/,/g, '-');
                if(document.getElementById(id)) document.getElementById(id).className = (l === labs ? 'active' : '');
            });

            const res = await fetch(`/api/timetable?labs=${labs}&date=${date}`);
            if (res.status === 401) window.location.href = 'index.html';
            const data = await res.json();

            document.getElementById('display-date').innerText = `${data.day} (${data.date})`;
            
            const grid = document.getElementById('timetable-grid');
            grid.innerHTML = '';

            data.timetable.forEach(period => {
                const box = document.createElement('div');
                box.className = 'period-box';
                box.innerHTML = `<div class="period-header">Period ${period.period}</div>`;

                period.labs.forEach(lab => {
                    const labItem = document.createElement('div');
                    labItem.className = 'lab-item';
                    
                    let statusHtml = '';
                    if (lab.status.type === 'fixed') {
                        statusHtml = `<button class="btn-fixed">${lab.status.subject}</button>`;
                    } else if (lab.status.type === 'booked') {
                        statusHtml = `
                            <div class="btn-booked">
                                <div><div style="font-weight:700; color:var(--text-main);">Booked</div><div style="font-size:11px; margin-top:2px;">by ${lab.status.name}</div></div>
                                ${lab.status.own ? `<span class="cancel-link" onclick="cancelBooking(${lab.status.id})">Cancel</span>` : '<svg width="20" height="20" viewBox="0 0 24 24" fill="#64748b"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>'}
                            </div>`;
                    } else {
                        statusHtml = `<button class="btn-book" onclick="openBookingModal(${lab.lab_id}, '${lab.lab_name}', ${period.period}, '${data.day}', '${data.date}')">Book Now</button>`;
                    }

                    labItem.innerHTML = `
                        <div class="lab-info">
                            <span style="font-size: 18px;">💻</span> ${lab.lab_name}
                        </div>
                        ${statusHtml}
                    `;
                    box.appendChild(labItem);
                });
                grid.appendChild(box);
            });
        }

        function dateChanged() {
            currentDate = document.getElementById('date-picker').value;
            loadTimetable();
        }

        function openBookingModal(labId, labName, period, day, date) {
            selectedSlot = { labId, period, day, date };
            document.getElementById('modal-text').innerHTML = `<b style="font-size: 18px;">${labName}</b><br><div style="margin-top: 5px;">Period ${period}</div>`;
            document.getElementById('booking-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('booking-modal').style.display = 'none';
        }

        async function confirmBooking() {
            const res = await fetch('/api/book', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    lab: selectedSlot.labId,
                    period: selectedSlot.period,
                    day: selectedSlot.day,
                    date: selectedSlot.date
                })
            });
            const data = await res.json();
            if (data.success) {
                closeModal();
                loadTimetable();
            } else if (data.message === 'limit') {
                alert('❌ Limit reached');
            } else {
                alert('Error booking slot');
            }
        }

        async function cancelBooking(id) {
            if (!confirm('Cancel this booking?')) return;
            const res = await fetch(`/api/cancel_booking/${id}`, { method: 'DELETE' });
            if (res.ok) loadTimetable();
        }

        async function logout() {
            await fetch('/api/logout');
            window.location.href = 'index.html';
        }

        fetchNotice();
        loadTimetable();
        
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("/sw.js").catch(err => console.log(err));
        }
    </script>
</body>
</html>
