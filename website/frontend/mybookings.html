<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Bookings | Lab Booking</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=20">
</head>
<body>
    <div class="header">
        <div style="display: flex; align-items: center; gap: 10px;">
            <div style="width: 24px; height: 24px; background: var(--primary); border-radius: 4px; display: flex; justify-content: center; align-items: center;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="#ffffff"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 14l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
            </div>
            <span>My Bookings</span>
        </div>
        <div style="font-size: 13px; font-weight: 500; color: var(--text-muted);">Faculty log</div>
    </div>
    
    <div class="main-layout">
        <!-- Desktop Sidebar -->
        <div class="sidebar">
            <h2>Categories</h2>
            <a href="dashboard.html?labs=1,2">Lab 1 & 2</a>
            <a href="dashboard.html?labs=5,6,7">Lab 5, 6, 7</a>
            <a href="dashboard.html?labs=3,4">Halls</a>
            <hr style="border: 0; border-top: 1px solid var(--border); margin: 16px 0;">
            <h2>Quick Links</h2>
            <a href="mybookings.html" class="active">My Bookings</a>
            <a href="calendar_view.html">Calendar</a>
            <div style="flex:1;"></div>
            <a href="#" onclick="logout()" style="color: var(--danger); margin-top: auto;">Sign out</a>
        </div>

        <div class="main-content">
            <div class="section-header">
                <div>
                    <h1 class="section-title">My Reservation Log</h1>
                    <div style="font-size: 13px; color: var(--text-muted); margin-top: 2px;">Review and manage your scheduled laboratory sessions.</div>
                </div>
            </div>

            <div class="booking-list" id="bookings-container">
                <div style="text-align: center; color: var(--text-muted); font-weight: 500; font-size: 13px; padding: 24px;">Loading reservation data...</div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="dashboard.html">
            <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
            <span>Home</span>
        </a>
        <a href="mybookings.html" class="active">
            <svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg>
            <span>Bookings</span>
        </a>
        <a href="calendar_view.html">
            <svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20a2 2 0 0 0 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"/></svg>
            <span>Calendar</span>
        </a>
        <a href="#" onclick="logout()">
            <svg viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
            <span>Logout</span>
        </a>
    </div>

    <script>
        async function fetchMyBookings() {
            const res = await fetch('/api/mybookings');
            const data = await res.json();
            const container = document.getElementById('bookings-container');
            container.innerHTML = '';

            if (data.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 48px 24px; background: var(--card-bg); border-radius: var(--radius-card); border: 1px dashed var(--border);">
                        <p style="margin:0 0 8px; font-size:14px; font-weight:600; color:var(--text-main);">No active reservations</p>
                        <p style="margin:0; font-size:13px; color:var(--text-muted);">You do not have any upcoming lab slots booked.</p>
                        <button onclick="window.location.href='dashboard.html'" class="btn-sm" style="margin-top:16px;">View Timetable</button>
                    </div>`;
                return;
            }

            data.forEach(b => {
                const card = document.createElement('div');
                card.className = 'booking-card';
                card.innerHTML = `
                    <div class="booking-card-info">
                        <h4>${b.lab_name} &bull; <span style="font-weight:500; color:var(--primary);">Period ${b.period}</span></h4>
                        <p>${b.booking_date} (${b.day})</p>
                    </div>
                    <div>
                        <button class="btn-secondary btn-sm" style="color:var(--danger);" onclick="cancel(${b.id})">Release</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function cancel(id) {
            if (!confirm('Are you sure you want to release this time slot?')) return;
            const res = await fetch(`/api/cancel_booking/${id}`, { method: 'DELETE' });
            if (res.ok) {
                fetchMyBookings();
            } else {
                alert('An error occurred.');
            }
        }

        async function logout() {
            await fetch('/api/logout');
            window.location.href = 'index.html';
        }

        fetchMyBookings();
    </script>
</body>
</html>
