<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Bookings - Lab Booking</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .booking-list {
            background: white; border-radius: 16px; padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #e5e7eb; }
        th { color: #6b7280; font-weight: 600; font-size: 13px; }
        .cancel-btn { color: #ef4444; cursor: pointer; font-weight: 500; text-decoration: none; }
    </style>
</head>
<body>
    <div class="header">📋 My Booking History</div>
    <div class="container">
        <div class="booking-list">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3 style="margin: 0;">Recent Activity</h3>
                <button onclick="window.history.back()" style="width: auto; padding: 8px 15px; background: #6b7280;">Back</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Day</th>
                        <th>Lab</th>
                        <th>Period</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="bookings-table">
                    <tr><td colspan="5" style="text-align: center;">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function fetchMyBookings() {
            const res = await fetch('/api/mybookings');
            const data = await res.json();
            const table = document.getElementById('bookings-table');
            table.innerHTML = '';

            if (data.length === 0) {
                table.innerHTML = '<tr><td colspan="5" style="text-align: center;">No bookings found</td></tr>';
                return;
            }

            data.forEach(b => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${b.booking_date}</td>
                    <td>${b.day}</td>
                    <td>${b.lab_name}</td>
                    <td>Period ${b.period}</td>
                    <td><a href="#" onclick="cancel(${b.id})" class="cancel-btn">Cancel</a></td>
                `;
                table.appendChild(tr);
            });
        }

        async function cancel(id) {
            if (!confirm('Cancel this booking?')) return;
            const res = await fetch(`/api/cancel_booking/${id}`, { method: 'DELETE' });
            if (res.ok) fetchMyBookings();
        }

        fetchMyBookings();
    </script>
</body>
</html>
