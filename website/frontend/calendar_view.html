<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Calendar - Lab Booking</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/style.css">
    <script>

        (function() {
            const originalFetch = window.fetch;
            const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? '' : 'https://lab-booking-app.onrender.com';
            
            window.fetch = function(input, init) {
                if (typeof input === 'string' && input.startsWith('/')) {
                    if (window.location.origin !== 'https://lab-booking-app.onrender.com') {
                        input = API_BASE + input;
                    }
                }
                init = init || {};
                init.credentials = 'include';
                return originalFetch(input, init);
            };
        })();
    </script>
</head>
<body class="bg-slate-50 flex flex-col min-h-screen pb-20 select-none safe-area-bottom">

    <!-- Top Navbar -->
    <nav class="bg-gradient-to-r from-brand-600 to-indigo-800 text-white sticky top-0 z-40 shadow-md px-4 py-4 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <button onclick="window.location.href='dashboard.html'" class="p-2 bg-white/10 hover:bg-white/20 rounded-xl transition active:scale-95">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
            </button>
            <h1 class="font-extrabold text-lg tracking-tight">Calendar Overview</h1>
        </div>
        <div class="bg-white/10 p-2 rounded-xl text-white">
            <i data-lucide="calendar" class="w-4 h-4"></i>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 px-4 py-6 w-full max-w-lg mx-auto space-y-6">
        
        <!-- Month title banner -->
        <div class="bg-white md3-card p-4 flex items-center justify-between">
            <button onclick="prevMonth()" class="p-2.5 hover:bg-slate-100 rounded-full transition text-slate-700 active:scale-95" title="Previous Month">
                <i data-lucide="chevron-left" class="w-5 h-5"></i>
            </button>
            <h2 id="calendar-title" class="text-sm font-extrabold text-slate-900 uppercase tracking-widest leading-none">Loading month...</h2>
            <button onclick="nextMonth()" class="p-2.5 hover:bg-slate-100 rounded-full transition text-slate-700 active:scale-95" title="Next Month">
                <i data-lucide="chevron-right" class="w-5 h-5"></i>
            </button>
        </div>

        <!-- Legend Details Card -->
        <div class="bg-white md3-card p-4 flex justify-around text-[10px] font-bold text-slate-700 uppercase tracking-wider">
            <div class="flex items-center space-x-1.5">
                <span class="w-2 h-2 rounded-full bg-brand-500"></span>
                <span>Today</span>
            </div>
            <div class="flex items-center space-x-1.5">
                <span class="w-2 h-2 rounded-full bg-green-500"></span>
                <span>Available</span>
            </div>
            <div class="flex items-center space-x-1.5">
                <span class="w-2 h-2 rounded-full bg-red-500"></span>
                <span>Booked</span>
            </div>
        </div>

        <!-- Mobile-friendly calendar grid -->
        <div id="calendar-grid" class="grid grid-cols-4 gap-2 pb-8">
             <!-- Calendar day cards injected dynamically -->
        </div>
    </main>

    <!-- Bottom Navigation Bar (Mobile only) -->
    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-slate-200/80 px-4 pt-2 pb-6 z-40 flex justify-around items-center shadow-2xl safe-area-bottom" style="padding-bottom: calc(16px + env(safe-area-inset-bottom, 16px));">
        <a href="dashboard.html" class="flex flex-col items-center space-y-1 text-slate-500">
            <div class="nav-pill py-1 px-4 rounded-full flex items-center justify-center">
                <i data-lucide="home" class="w-5 h-5"></i>
            </div>
            <span class="text-[9px] font-bold tracking-wider text-slate-700">Home</span>
        </a>
        <a href="calendar_view.html" class="flex flex-col items-center space-y-1 text-brand-600">
            <div class="nav-pill nav-pill-active py-1 px-4 rounded-full flex items-center justify-center">
                <i data-lucide="calendar" class="w-5 h-5"></i>
            </div>
            <span class="text-[9px] font-bold tracking-wider text-brand-700">Calendar</span>
        </a>
        <a href="mybookings.html" class="flex flex-col items-center space-y-1 text-slate-500">
            <div class="nav-pill py-1 px-4 rounded-full flex items-center justify-center">
                <i data-lucide="file-text" class="w-5 h-5"></i>
            </div>
            <span class="text-[9px] font-bold tracking-wider text-slate-700">Bookings</span>
        </a>
        <a href="dashboard.html?tab=profile" class="flex flex-col items-center space-y-1 text-slate-500">
            <div class="nav-pill py-1 px-4 rounded-full flex items-center justify-center">
                <i data-lucide="user" class="w-5 h-5"></i>
            </div>
            <span class="text-[9px] font-bold tracking-wider text-slate-700">Profile</span>
        </a>
    </nav>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });

        let currentMonth = new Date().getMonth() + 1;
        let currentYear = new Date().getFullYear();

        async function loadCalendar(month = currentMonth, year = currentYear) {
            try {
                const res = await fetch(`/api/calendar?month=${month}&year=${year}`);
                if (res.status === 401) {
                    window.location.href = 'index.html';
                    return;
                }
                const data = await res.json();
                
                document.getElementById('calendar-title').innerText = `${data.month_name} ${data.year}`;
                
                const grid = document.getElementById('calendar-grid');
                grid.innerHTML = '';

                data.days.forEach(d => {
                    const dayDiv = document.createElement('div');
                    
                    let borderClass = "border-green-200 hover:border-green-300 bg-green-50/20";
                    let indicatorColor = "bg-green-500";
                    let label = "Available";
                    let textClass = "text-slate-900";

                    if(d.status === 'today') {
                        borderClass = "border-brand-500 bg-brand-50/50 ring-2 ring-brand-500/20";
                        indicatorColor = "bg-brand-500";
                        label = "Today";
                    } else if(d.status === 'booked') {
                        borderClass = "border-red-200 bg-red-50/30";
                        indicatorColor = "bg-red-500";
                        label = "Booked";
                    }

                    dayDiv.className = `rounded-2xl border p-3.5 flex flex-col items-center justify-center text-center cursor-pointer transition active:scale-95 shadow-sm ${borderClass}`;
                    
                    dayDiv.innerHTML = `
                        <b class="text-sm font-extrabold ${textClass}">${d.day}</b>
                        <div class="flex items-center space-x-1 mt-1">
                            <span class="w-1.5 h-1.5 rounded-full ${indicatorColor}"></span>
                            <span class="text-[8px] font-extrabold uppercase tracking-wider text-slate-700">${label}</span>
                        </div>
                    `;
                    
                    dayDiv.onclick = () => { window.location.href = `dashboard.html?date=${d.date}`; };

                    grid.appendChild(dayDiv);
                });
            } catch(e) {}
        }

        function prevMonth() {
            currentMonth--;
            if (currentMonth < 1) {
                currentMonth = 12;
                currentYear--;
            }
            loadCalendar(currentMonth, currentYear);
        }

        function nextMonth() {
            currentMonth++;
            if (currentMonth > 12) {
                currentMonth = 1;
                currentYear++;
            }
            loadCalendar(currentMonth, currentYear);
        }

        loadCalendar();
    </script>
</body>
</html>
