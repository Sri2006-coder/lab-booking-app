<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calendar - Lab Booking</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4F46E5">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=11">
</head>
<body>
    <div class="header">
        <div>📆 Calendar</div>
        <a href="dashboard.html" style="font-size: 14px; text-decoration: none; color: var(--primary); font-weight: 700;">Back</a>
    </div>

    <div class="container" style="max-width: 800px;">
        <div style="background: var(--card-bg); border-radius: var(--radius-card); padding: 24px; box-shadow: var(--shadow-soft); border: var(--glass-border);">
            <h2 id="calendar-title" style="text-align: center; margin: 0 0 24px; font-weight: 800; font-size: 20px; color: var(--text-main);">Loading...</h2>

            <div id="calendar-grid" class="calendar">
                <!-- Days will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="dashboard.html">
            <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
            <span>Home</span>
        </a>
        <a href="mybookings.html">
            <svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg>
            <span>Bookings</span>
        </a>
        <a href="calendar_view.html" class="active">
            <svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20a2 2 0 0 0 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"/></svg>
            <span>Calendar</span>
        </a>
        <a href="#" onclick="logout()">
            <svg viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
            <span>Logout</span>
        </a>
    </div>

    <script>
        async function loadCalendar() {
            const res = await fetch('/api/calendar');
            const data = await res.json();
            
            document.getElementById('calendar-title').innerText = `${data.month_name} ${data.year}`;
            
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';

            data.days.forEach(d => {
                const dayDiv = document.createElement('div');
                dayDiv.className = `day ${d.status}`;
                
                dayDiv.innerHTML = `
                    <b>${d.day}</b>
                    <span>${d.booked ? 'Booked' : 'Free'}</span>
                `;
                // Add click event to navigate to dashboard
                dayDiv.style.cursor = 'pointer';
                dayDiv.onclick = () => {
                    window.location.href = `dashboard.html?date=${d.date}`;
                };
                grid.appendChild(dayDiv);
            });
        }

        async function logout() {
            await fetch('/api/logout');
            window.location.href = 'index.html';
        }

        loadCalendar();
    </script>
</body>
</html>
