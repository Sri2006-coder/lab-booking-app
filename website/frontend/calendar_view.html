<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Calendar - Slotify</title>
    <!-- Preconnect for faster font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@0.525.0/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="/style.css">
    <script src="/api-config.js"></script>
    <script>
        (function() {
            const originalFetch = window.fetch;
            const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? '' : BACKEND_URL;
            
            window.fetch = function(input, init) {
                if (typeof input === 'string' && input.startsWith('/')) {
                    if (window.location.origin !== BACKEND_URL) {
                        input = API_BASE + input;
                    }
                }
                init = init || {};
                init.credentials = 'include';
                return originalFetch(input, init);
            };
        })();
    </script>
</head>
<body class="bg-slate-50 flex flex-col min-h-screen pb-20 select-none safe-area-bottom">

    <!-- Top Navbar -->
    <nav class="bg-gradient-to-r from-brand-600 to-indigo-800 text-white sticky top-0 z-40 shadow-md px-4 py-4 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <button onclick="window.location.href='dashboard.html'" class="p-2 bg-white/10 hover:bg-white/20 rounded-xl transition active:scale-95 flex items-center justify-center">
                <span class="material-symbols-rounded text-white text-sm">arrow_back</span>
            </button>
            <h1 class="font-extrabold text-lg tracking-tight">Calendar Overview</h1>
        </div>
        <div class="bg-white/10 p-2 rounded-xl text-white flex items-center justify-center">
            <span class="material-symbols-rounded text-white text-sm">calendar_month</span>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 px-4 py-6 w-full max-w-lg mx-auto space-y-6">
        
        <!-- Month title banner -->
        <div class="bg-white md3-card p-4 flex items-center justify-between">
            <button onclick="prevMonth()" class="p-2.5 hover:bg-slate-100 rounded-full transition text-slate-700 active:scale-95 flex items-center justify-center" title="Previous Month">
                <span class="material-symbols-rounded">chevron_left</span>
            </button>
            <h2 id="calendar-title" class="text-sm font-extrabold text-slate-900 uppercase tracking-widest leading-none">Loading month...</h2>
            <button onclick="nextMonth()" class="p-2.5 hover:bg-slate-100 rounded-full transition text-slate-700 active:scale-95 flex items-center justify-center" title="Next Month">
                <span class="material-symbols-rounded">chevron_right</span>
            </button>
        </div>

        <!-- Legend Details Card -->
        <div class="bg-white md3-card p-4 flex justify-around text-[10px] font-bold text-slate-700 uppercase tracking-wider">
            <div class="flex items-center space-x-1.5">
                <span class="w-2 h-2 rounded-full bg-brand-500"></span>
                <span>Today</span>
            </div>
            <div class="flex items-center space-x-1.5">
                <span class="w-2 h-2 rounded-full bg-green-500"></span>
                <span>Free</span>
            </div>
            <div class="flex items-center space-x-1.5">
                <span class="w-2 h-2 rounded-full bg-red-500"></span>
                <span>Busy</span>
            </div>
        </div>

        <!-- Mobile-friendly calendar grid -->
        <div id="calendar-grid" class="grid grid-cols-4 gap-2 pb-8">
             <!-- Calendar day cards injected dynamically -->
        </div>
    </main>

    <!-- Bottom Navigation Bar (Mobile only) -->
    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-slate-200/80 px-4 pt-2 pb-6 z-40 flex justify-around items-center shadow-2xl safe-area-bottom" style="padding-bottom: calc(16px + env(safe-area-inset-bottom, 16px));">
        <a href="dashboard.html" class="flex flex-col items-center space-y-1 text-slate-500">
            <div class="nav-pill py-1 px-4 rounded-full flex items-center justify-center">
                <span class="material-symbols-rounded">home</span>
            </div>
            <span class="text-[9px] font-bold tracking-wider text-slate-700">Home</span>
        </a>
        <a href="calendar_view.html" class="flex flex-col items-center space-y-1 text-brand-600">
            <div class="nav-pill nav-pill-active py-1 px-4 rounded-full flex items-center justify-center">
                <span class="material-symbols-rounded">calendar_month</span>
            </div>
            <span class="text-[9px] font-bold tracking-wider text-brand-700">Calendar</span>
        </a>
        <a href="mybookings.html" class="flex flex-col items-center space-y-1 text-slate-500">
            <div class="nav-pill py-1 px-4 rounded-full flex items-center justify-center">
                <span class="material-symbols-rounded">book_online</span>
            </div>
            <span class="text-[9px] font-bold tracking-wider text-slate-700">Bookings</span>
        </a>
        <a href="dashboard.html?tab=profile" class="flex flex-col items-center space-y-1 text-slate-500">
            <div class="nav-pill py-1 px-4 rounded-full flex items-center justify-center">
                <span class="material-symbols-rounded">person</span>
            </div>
            <span class="text-[9px] font-bold tracking-wider text-slate-700">Profile</span>
        </a>
    </nav>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) {
                lucide.createIcons();
            }
        });

        let currentMonth = new Date().getMonth() + 1;
        let currentYear = new Date().getFullYear();

        async function loadCalendar(month = currentMonth, year = currentYear) {
            try {
                const res = await fetch(`/api/calendar?month=${month}&year=${year}`);
                if (res.status === 401) {
                    window.location.href = 'index.html';
                    return;
                }
                const data = await res.json();
                
                document.getElementById('calendar-title').innerText = `${data.month_name} ${data.year}`;
                
                const grid = document.getElementById('calendar-grid');
                grid.innerHTML = '';

                data.days.forEach(d => {
                    const dayDiv = document.createElement('div');
                    
                    let borderClass = "border-green-200 hover:border-green-300 bg-green-50/20";
                    let badgeClass = "bg-green-100 text-green-700 border border-green-200/50";
                    let labelText = "FREE";
                    let textClass = "text-slate-900";

                    if(d.status === 'today') {
                        borderClass = "border-brand-500 bg-brand-50/50 ring-2 ring-brand-500/20";
                        badgeClass = "bg-brand-100 text-brand-700 border border-brand-200/50";
                        labelText = "TODAY";
                    } else if(d.status === 'booked') {
                        borderClass = "border-red-200 bg-red-50/30";
                        badgeClass = "bg-red-100 text-red-700 border border-red-200/50";
                        labelText = "BUSY";
                    }

                    dayDiv.className = `rounded-2xl border p-4 flex flex-col items-center justify-center text-center cursor-pointer transition active:scale-95 shadow-sm relative ${borderClass}`;
                    
                    dayDiv.innerHTML = `
                        <span class="text-base font-black ${textClass}">${d.day}</span>
                        <span class="mt-2 px-2.5 py-0.5 rounded-full text-[9px] font-black uppercase tracking-wider ${badgeClass}">${labelText}</span>
                    `;
                    
                    dayDiv.onclick = () => { window.location.href = `dashboard.html?date=${d.date}`; };

                    grid.appendChild(dayDiv);
                });
            } catch(e) {}
        }

        function prevMonth() {
            currentMonth--;
            if (currentMonth < 1) {
                currentMonth = 12;
                currentYear--;
            }
            loadCalendar(currentMonth, currentYear);
        }

        function nextMonth() {
            currentMonth++;
            if (currentMonth > 12) {
                currentMonth = 1;
                currentYear++;
            }
            loadCalendar(currentMonth, currentYear);
        }

        loadCalendar();
    </script>
</body>
</html>
