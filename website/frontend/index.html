<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Slotify</title>
    <!-- Preconnect for faster font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@0.525.0/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="/style.css">
    <script src="/api-config.js"></script>
    <script>
        (function() {
            const originalFetch = window.fetch;
            const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? '' : BACKEND_URL;
            
            window.fetch = function(input, init) {
                if (typeof input === 'string' && input.startsWith('/')) {
                    if (window.location.origin !== BACKEND_URL) {
                        input = API_BASE + input;
                    }
                }
                init = init || {};
                init.credentials = 'include';
                return originalFetch(input, init);
            };
        })();
    </script>
</head>
<body class="bg-slate-50 h-screen flex flex-col justify-center items-center px-4 overflow-hidden relative">

    <!-- Decorative Blurs -->
    <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-blue-400/10 blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-indigo-400/10 blur-[100px] pointer-events-none"></div>

    <!-- Splash Screen Overlay -->
    <div id="splash-screen" class="fixed inset-0 bg-brand-600 z-[999] flex flex-col justify-center items-center text-white transition-opacity duration-500">
        <div class="splash-pulse flex flex-col items-center text-center">
            <!-- Slotify SVG Logo centered on splash screen -->
            <div class="w-24 h-24 mb-6 flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" class="w-24 h-24">
                    <!-- Laptop Screen Outer -->
                    <rect x="24" y="28" width="52" height="34" rx="4" stroke="#FFFFFF" stroke-width="4" stroke-linejoin="round" fill="none" />
                    <!-- Laptop Screen Inner Line/Fill -->
                    <rect x="29" y="33" width="42" height="24" rx="2" fill="#FFFFFF" fill-opacity="0.1" />
                    <!-- Laptop Base -->
                    <path d="M 18 62 L 82 62 L 78 67 L 22 67 Z" fill="#FFFFFF" />
                    <rect x="44" y="62" width="12" height="3" rx="1" fill="#2563EB" opacity="0.8" />
                    <!-- Digital Pixels Flowing Outward -->
                    <rect x="74" y="24" width="4" height="4" rx="1" fill="#00F0FF" opacity="0.9" />
                    <rect x="82" y="16" width="3" height="3" rx="0.5" fill="#00F0FF" opacity="0.7" />
                    <rect x="70" y="14" width="3" height="3" rx="0.5" fill="#FFFFFF" opacity="0.8" />
                    <rect x="22" y="22" width="4" height="4" rx="1" fill="#FFFFFF" opacity="0.9" />
                    <rect x="14" y="14" width="3" height="3" rx="0.5" fill="#FFFFFF" opacity="0.7" />
                    <rect x="26" y="12" width="3" height="3" rx="0.5" fill="#00F0FF" opacity="0.8" />
                    <rect x="48" y="20" width="4" height="4" rx="1" fill="#00F0FF" opacity="0.9" />
                </svg>
            </div>
            <h1 class="text-4xl font-extrabold tracking-tight">Slotify</h1>
            <p class="text-blue-100 text-xs mt-2 tracking-widest font-bold uppercase">Smart Lab Booking System</p>
            <p class="text-blue-200 text-[10px] mt-1.5 tracking-wider font-semibold">Book. Manage. Learn.</p>
        </div>
        <div class="absolute bottom-10 flex flex-col items-center">
            <div class="w-6 h-6 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
            <span class="text-blue-200 text-xs mt-3 font-semibold">Initializing Secure Shell...</span>
        </div>
    </div>

    <!-- Main Container Card -->
    <div id="login-container" class="w-full max-w-md bg-white/80 rounded-3xl shadow-2xl p-8 border border-slate-100 backdrop-blur-lg fade-in hidden relative z-10">
        <div class="text-center mb-8">
            <!-- Full Slotify Logo (Icon + Text) -->
            <div class="flex justify-center mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" class="h-16 w-auto">
                    <defs>
                        <linearGradient id="slotifyGradIndex" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#2563EB" />
                            <stop offset="100%" stop-color="#06B6D4" />
                        </linearGradient>
                    </defs>
                    <g transform="translate(10, 10)">
                        <rect x="12" y="16" width="36" height="24" rx="3" stroke="url(#slotifyGradIndex)" stroke-width="3" stroke-linejoin="round" fill="none" />
                        <rect x="15.5" y="19.5" width="29" height="17" rx="1.5" fill="url(#slotifyGradIndex)" fill-opacity="0.1" />
                        <path d="M 8 40 L 52 40 L 49 43.5 L 11 43.5 Z" fill="url(#slotifyGradIndex)" />
                        <rect x="26" y="40" width="8" height="2" rx="0.5" fill="#FFFFFF" opacity="0.8" />
                        <rect x="47" y="13" width="3" height="3" rx="0.5" fill="#06B6D4" opacity="0.9" />
                        <rect x="52" y="8" width="2" height="2" fill="#06B6D4" opacity="0.6" />
                        <rect x="44" y="7" width="2" height="2" fill="#2563EB" opacity="0.8" />
                        <rect x="10" y="12" width="3" height="3" rx="0.5" fill="#2563EB" opacity="0.9" />
                        <rect x="5" y="7" width="2" height="2" fill="#2563EB" opacity="0.6" />
                        <rect x="12" y="6" width="2" height="2" fill="#06B6D4" opacity="0.7" />
                        <rect x="28" y="10" width="3" height="3" rx="0.5" fill="url(#slotifyGradIndex)" opacity="0.85" />
                    </g>
                    <text x="80" y="38" font-family="'Poppins', 'Inter', sans-serif" font-size="26" font-weight="800" fill="#1E293B" letter-spacing="-0.5">Slotify</text>
                    <text x="80" y="55" font-family="'Inter', sans-serif" font-size="9.5" font-weight="600" fill="#64748B" letter-spacing="0.2">Smart Lab Booking System</text>
                </svg>
            </div>
            <h2 class="text-xl font-bold text-slate-900 tracking-tight">Sign In to Your Account</h2>
            <p class="text-xs text-slate-500 mt-1">Book. Manage. Learn.</p>
        </div>
        
        <!-- Error Alerts -->
        <div id="error-msg" class="hidden mb-6 p-4 bg-red-50 border border-red-200 text-red-700 text-xs rounded-2xl text-center font-semibold slide-down flex items-center justify-center space-x-2">
            <!-- Keeps text injected dynamically -->
        </div>
        
        <!-- Form -->
        <form id="login-form" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Email Address</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-500 pointer-events-none">
                        <span class="material-symbols-rounded text-slate-400">mail</span>
                    </span>
                    <input type="email" id="email" placeholder="email@college.edu" required class="w-full pl-11 pr-4 py-3.5 outline-none transition bg-slate-50/50 focus:bg-white text-sm text-slate-900 font-medium md3-input">
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-500 pointer-events-none">
                        <span class="material-symbols-rounded text-slate-400">lock</span>
                    </span>
                    <input type="password" id="password" placeholder="••••••••" required class="w-full pl-11 pr-4 py-3.5 outline-none transition bg-slate-50/50 focus:bg-white text-sm text-slate-900 font-medium md3-input">
                </div>
            </div>
            
            <button type="submit" class="w-full btn-primary py-4 text-sm ripple">
                Login
            </button>
        </form>
        
        <div class="mt-8 text-center text-xs text-slate-600 font-semibold flex items-center justify-center space-x-3">
            <span>Faculty Panel</span>
            <span class="w-1.5 h-1.5 rounded-full bg-slate-300"></span>
            <a href="register.html" class="text-brand-600 hover:text-brand-700 font-black transition underline decoration-2">Register</a>
        </div>
    </div>

    <script>
        // Auto-redirect if session exists
        async function checkSession() {
            try {
                const res = await fetch("/current_user");
                const user = await res.json();
                if (user && user.id) {
                    window.location.replace(user.role === 'admin' ? 'admin.html' : 'dashboard.html');
                }
            } catch(e) {}
        }
        checkSession();

        // Control splash screen animations
        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                const container = document.getElementById('login-container');
                
                splash.style.opacity = '0';
                container.classList.remove('hidden');
                setTimeout(() => {
                    splash.style.display = 'none';
                }, 400);
            }, 500);  // Reduced from 1500ms — page is loaded, no need to wait
        });

        // Listen for token from Mobile App (Expo)
        window.addEventListener("message", (event) => {
            const data = event.data;
            if (data.type === 'expo-token') {
                console.log("📱 Mobile Token Received on Login Page:", data.token);
                // Save to localStorage so it persists after login
                localStorage.setItem('expo-token', data.token);
                
                fetch('/save-token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: data.token })
                }).then(r => r.json()).then(d => console.log("Token save response:", d));
            }
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();
                if (data.success) {
                    if (data.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                } else {
                    errorMsg.innerText = "❌ " + data.message;
                    errorMsg.classList.remove('hidden');
                }
            } catch (err) {
                errorMsg.innerText = "❌ Connection or Server error. Please check your internet connection.";
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
