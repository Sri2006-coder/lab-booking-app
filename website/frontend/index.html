<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Lab Booking App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4F46E5">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CDN temporarily removed to prioritize custom premium CSS, keeping lightweight -->
    <link rel="stylesheet" href="style.css?v=11">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="app-icon">
                <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 14l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
            </div>
            <h2>Welcome Back</h2>
            <p class="subtitle">Log in to manage your labs</p>
            
            <div id="error-msg" class="msg" style="display: none; background: #fef2f2; color: #ef4444; padding: 12px; border-radius: 12px; margin-bottom: 16px; font-size: 13px; font-weight: 600;"></div>
            
            <form id="login-form">
                <input type="email" id="email" placeholder="Faculty Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Sign In</button>
            </form>
            <div style="margin-top: 24px; color: var(--text-muted); font-size: 13px; font-weight: 600;">
                Secure Access • LabApp Pro
            </div>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();
                if (data.success) {
                    if (data.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                } else {
                    errorMsg.innerText = "❌ " + data.message;
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.innerText = "❌ Server error";
                errorMsg.style.display = 'block';
            }
        });

        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("/sw.js").catch(err => console.log(err));
        }
    </script>
</body>
</html>
