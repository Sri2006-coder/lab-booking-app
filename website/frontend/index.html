<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Lab Management Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=20">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 24px;">
                <div style="width: 32px; height: 32px; background: var(--primary); border-radius: 6px; display: flex; justify-content: center; align-items: center;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="#ffffff"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 14l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                </div>
                <h2 style="margin: 0; font-size: 18px;">Lab Manager</h2>
            </div>
            
            <p class="subtitle" style="margin-bottom: 20px;">Sign in to your faculty account to continue.</p>
            
            <div id="error-msg" class="msg msg-error" style="display: none;"></div>
            
            <form id="login-form">
                <div>
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@institution.edu" required>
                </div>
                <div>
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" style="margin-top: 8px;">Sign In</button>
            </form>
            
            <div style="margin-top: 24px; text-align: center; font-size: 12px; color: var(--text-muted);">
                &copy; 2026 Admin Portal Solutions
            </div>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();
                if (data.success) {
                    if (data.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                } else {
                    errorMsg.innerText = data.message;
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.innerText = "Connection error. Please try again later.";
                errorMsg.style.display = 'block';
            }
        });

        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("/sw.js").catch(err => console.log(err));
        }
    </script>
</body>
</html>
