<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Add Lab - Lab Booking</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <!-- Top Navbar -->
    <nav class="bg-indigo-600 text-white sticky top-0 z-40 shadow-md flex items-center justify-between px-4 py-3">
        <div class="flex items-center">
            <button onclick="window.history.back()" class="mr-3 p-1 rounded-full hover:bg-white/20 active:scale-95 transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            </button>
            <h1 class="font-bold text-xl tracking-tight">➕ Add Lab</h1>
        </div>
    </nav>

    <main class="flex-1 px-4 py-6 w-full max-w-md mx-auto">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
            <h3 class="text-xl font-bold text-gray-800 mb-2">Lab Details</h3>
            <p class="text-sm text-gray-500 mb-6">Create a new lab or hall in the system.</p>

            <div id="status" class="hidden mb-4 p-3 rounded-lg text-sm font-medium text-center"></div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Lab Name</label>
                    <input type="text" id="lab-name" placeholder="E.g. Computer Lab 8" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition bg-gray-50 focus:bg-white text-gray-900">
                </div>
                
                <button onclick="addLab()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl shadow-md active:scale-95 transition text-lg mt-2">Add Lab</button>
            </div>
        </div>
    </main>

    <script>
        async function addLab() {
            const name = document.getElementById('lab-name').value;
            const status = document.getElementById('status');
            if (!name) return alert('Enter a name');

            try {
                const res = await fetch('/api/labs', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
                const data = await res.json();
                
                status.classList.remove('hidden', 'bg-red-50', 'text-red-700', 'bg-green-50', 'text-green-700');
                if (data.success) {
                    status.innerText = "✅ Lab added successfully";
                    status.classList.add('bg-green-50', 'text-green-700');
                    document.getElementById('lab-name').value = '';
                } else {
                    status.innerText = "❌ Error: " + data.message;
                    status.classList.add('bg-red-50', 'text-red-700');
                }
            } catch(e) {
                status.innerText = "❌ Server Error";
                status.classList.remove('hidden');
                status.classList.add('bg-red-50', 'text-red-700');
            }
        }
    </script>
</body>
</html>
