<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Lab - Lab Booking</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .form-card {
            background: white; padding: 25px; border-radius: 16px; 
            max-width: 400px; margin: 40px auto;
            border-left: 5px solid #4f46e5;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>
    <div class="header">➕ Add New Lab</div>
    <div class="container">
        <div class="form-card">
            <h3 style="margin-top: 0;">Lab Details</h3>
            <div id="status" class="msg" style="display: none;"></div>
            <div class="input-group">
                <input type="text" id="lab-name" placeholder="Enter Lab Name (e.g. Lab 8)">
            </div>
            <button onclick="addLab()">Add Lab</button>
            <button onclick="window.location.href='admin.html'" style="background: #9ca3af; margin-top: 10px;">Back to Dashboard</button>
        </div>
    </div>

    <script>
        async function addLab() {
            const name = document.getElementById('lab-name').value;
            const status = document.getElementById('status');
            if (!name) return alert('Enter a name');

            const res = await fetch('/api/labs', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });
            const data = await res.json();
            if (data.success) {
                status.innerText = "✅ Lab added successfully";
                status.style.display = 'block';
                status.style.background = '#ecfdf5';
                status.style.color = '#065f46';
                status.style.borderLeftColor = '#10b981';
                document.getElementById('lab-name').value = '';
            } else {
                status.innerText = "❌ Error: " + data.message;
                status.style.display = 'block';
            }
        }
    </script>
</body>
</html>
