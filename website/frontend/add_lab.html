<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Lab - Lab Booking</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=11">
    <style>
        .form-card {
            background: var(--card-bg); padding: 32px 24px; border-radius: 24px; 
            max-width: 400px; margin: 40px auto;
            border: var(--glass-border);
            box-shadow: var(--shadow-soft);
        }
    </style>
</head>
<body>
    <div class="header">
        <div>➕ Add New Lab</div>
    </div>
    
    <div class="container">
        <div class="form-card">
            <div style="width: 64px; height: 64px; border-radius: 20px; background: rgba(79, 70, 229, 0.1); color: #4F46E5; display: flex; justify-content: center; align-items: center; font-size: 32px; margin: 0 auto 20px;">
                💻
            </div>
            <h3 style="margin: 0 0 24px; font-weight: 800; text-align: center; font-size: 20px;">Lab Details</h3>
            
            <div id="status" class="msg" style="display: none; padding: 12px; border-radius: 12px; font-weight: 600; font-size: 13px; margin-bottom: 20px;"></div>
            
            <div style="margin-bottom: 20px;">
                <input type="text" id="lab-name" placeholder="Enter Lab Name (e.g. Lab 8)" style="margin-bottom: 0;">
            </div>
            
            <button onclick="addLab()">Add Lab</button>
            <button onclick="window.location.href='admin.html'" class="btn-secondary" style="font-weight: 700;">Back to Dashboard</button>
        </div>
    </div>

    <script>
        async function addLab() {
            const name = document.getElementById('lab-name').value;
            const status = document.getElementById('status');
            if (!name) return alert('Enter a name');

            const res = await fetch('/api/labs', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });
            const data = await res.json();
            if (data.success) {
                status.innerText = "✅ Lab added successfully";
                status.style.display = 'block';
                status.style.background = 'rgba(16, 185, 129, 0.1)';
                status.style.color = '#059669';
                document.getElementById('lab-name').value = '';
            } else {
                status.innerText = "❌ Error: " + data.message;
                status.style.display = 'block';
                status.style.background = 'rgba(244, 63, 94, 0.1)';
                status.style.color = '#E11D48';
            }
        }
    </script>
</body>
</html>
