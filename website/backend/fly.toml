app = "lab-booking-app"
primary_region = "sin"   # Singapore — closest free region to India

[build]
  builder = "paketobuildpacks/builder:base"

[env]
  PORT = "8080"
  PYTHON_VERSION = "3.10.0"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false   # Keep alive — no cold starts
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
